version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - echo Installing system dependencies...
      - amazon-linux-extras enable epel
      - yum clean metadata
      - yum -y install epel-release
      - yum -y install gcc python3-devel openssl-devel libffi-devel
      - yum -y install libtool-ltdl-devel xmlsec1-devel xmlsec1-openssl-devel
      - yum -y install libxml2-devel xmlsec1 libyaml-devel
      - echo Installing pip and virtualenv...
      - curl -O https://bootstrap.pypa.io/get-pip.py
      - python3 get-pip.py
      - pip install --upgrade pip==24.1.2
      - pip install virtualenv

  pre_build:
    commands:
      - echo Setting up Python virtual environment...
      - virtualenv venv
      - . venv/bin/activate
      - echo Installing project requirements...
      - pip install setuptools==68.0.0
      - pip install wheel
      - pip install -r requirements.txt
      - echo Verifying installations...
      - python -c "import xmlsec; import cryptography; import gevent" || echo "Import verification failed but continuing..."

  build:
    commands:
      - echo Build started on `date`
      - echo Running tests...
      - python -m pytest tests/ || echo "No tests found or tests failed"

  post_build:
    commands:
      - echo Post-build phase started on `date`
      - echo Preparing artifacts...
      - mkdir -p artifacts
      - cp -r * artifacts/ || echo "No files to copy"
      - echo Build completed successfully!

artifacts:
  files:
    - '**/*'
  base-directory: artifacts

cache:
  paths:
    - '/root/.cache/pip'
    - 'venv/**/*'
