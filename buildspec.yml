version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - echo Installing dependencies...
      - pip install virtualenv
  build:
    commands:
      - echo Cloning Confidant repository...
      - virtualenv venv
      - source venv/bin/activate
      - pip install -r requirements.txt
      - echo Build completed successfully!
