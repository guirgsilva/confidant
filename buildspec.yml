version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - echo "Atualizando o ambiente de construção..."
      - apt-get update && apt-get install -y coreutils  # Para garantir que o comando 'cat' esteja disponível
      - echo "Instalando dependências do projeto..."
      - pip install --upgrade pip
      - pip install virtualenv
  pre_build:
    commands:
      - echo "Criando e ativando ambiente virtual..."
      - virtualenv venv
      - . venv/bin/activate
      - echo "Instalando pacotes do requirements.txt..."
      - pip install -r requirements.txt
  build:
    commands:
      - echo "Iniciando a fase de construção..."
      - python -m pytest tests/ || echo "Nenhum teste encontrado ou testes falharam"
  post_build:
    commands:
      - echo "Construção concluída em $(date)"
artifacts:
  files:
    - '**/*'
  base-directory: .
cache:
  paths:
    - '/root/.cache/pip'
    - 'venv/**/*'
